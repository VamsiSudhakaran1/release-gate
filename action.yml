name: "release-gate"
description: "AI release decision engine — score, compare, validate traces, and generate evidence before deployment."
author: "Vamsi Sudhakaran"

branding:
  icon: "shield"
  color: "blue"

inputs:
  config:
    description: "Path to governance.yaml"
    required: false
    default: "governance.yaml"
  command:
    description: "Command: 'audit', 'score', 'evidence-pack', 'impact', or 'run'"
    required: false
    default: "score"
  path:
    description: "Repo path to audit (command: audit). Defaults to the checked-out repo."
    required: false
    default: "."
  evals:
    description: "Path to an evals.yaml of behavior test cases (score / evidence-pack)"
    required: false
    default: ""
  traces:
    description: "Path to an agent execution trace JSON/JSONL to validate (score / evidence-pack)"
    required: false
    default: ""
  html-report:
    description: "If set, write an HTML evidence/impact report to this path (e.g. report.html)"
    required: false
    default: ""
  output-evidence:
    description: "If set, write the JSON readiness report to this path"
    required: false
    default: ""
  fail-on-warn:
    description: "Exit with code 1 on WARN as well as FAIL (default: false)"
    required: false
    default: "false"
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"

outputs:
  decision:
    description: "PROMOTE/HOLD/BLOCK (score) or PASS/WARN/FAIL (run, impact)"
  daily-cost:
    description: "Estimated daily cost in USD (from Impact Simulator)"
  runaway-cost:
    description: "Runaway scenario daily cost in USD"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install release-gate
      shell: bash
      run: pip install release-gate --quiet

    - name: Run release-gate audit
      if: inputs.command == 'audit'
      id: audit
      shell: bash
      run: |
        set +e
        # Writes a Markdown report to the job summary automatically via
        # $GITHUB_STEP_SUMMARY, and still prints to the log.
        release-gate audit "${{ inputs.path }}" --markdown
        EXIT_CODE=$?
        set -e
        # audit exit codes: 0 PROMOTE/no-agent · 10 HOLD · 1 BLOCK
        if [ "$EXIT_CODE" -eq "10" ] && [ "${{ inputs.fail-on-warn }}" != "true" ]; then
          echo "Audit decision: HOLD (allowed — set fail-on-warn: true to block)"
          exit 0
        fi
        exit $EXIT_CODE

    - name: Run release-gate ${{ inputs.command }}
      if: inputs.command != 'audit'
      id: gate
      shell: bash
      run: |
        EXTRA_FLAGS=""
        if [ -n "${{ inputs.evals }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --evals ${{ inputs.evals }}"
        fi
        if [ -n "${{ inputs.traces }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --traces ${{ inputs.traces }}"
        fi
        if [ -n "${{ inputs.html-report }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --html-report ${{ inputs.html-report }}"
        fi
        if [ -n "${{ inputs.output-evidence }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --output-evidence ${{ inputs.output-evidence }}"
        fi

        set +e
        release-gate ${{ inputs.command }} ${{ inputs.config }} $EXTRA_FLAGS
        EXIT_CODE=$?
        set -e

        # Exit code 10 = WARN. Treat as failure only if fail-on-warn is true.
        if [ "$EXIT_CODE" -eq "10" ] && [ "${{ inputs.fail-on-warn }}" != "true" ]; then
          echo "Decision: WARN (allowed — set fail-on-warn: true to block)"
          exit 0
        fi
        exit $EXIT_CODE

    - name: Upload HTML report
      if: inputs.html-report != '' && always()
      uses: actions/upload-artifact@v4
      with:
        name: release-gate-report
        path: ${{ inputs.html-report }}
