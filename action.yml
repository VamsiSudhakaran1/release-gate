name: "release-gate"
description: "AI release decision engine — score, compare, validate traces, and generate evidence before deployment."
author: "Vamsi Sudhakaran"

branding:
  icon: "shield"
  color: "blue"

inputs:
  config:
    description: "Path to governance.yaml"
    required: false
    default: "governance.yaml"
  command:
    description: "Command: 'pr' (AI-change review gate), 'audit', 'score', 'evidence-pack', 'impact', 'run', or 'loop-sim'"
    required: false
    default: "score"
  base:
    description: "Base ref for 'command: pr' — the branch this PR is merging into (e.g. origin/main). Requires fetch-depth: 0 on checkout."
    required: false
    default: "origin/main"
  scenarios:
    description: "Path to a loop-sim scenarios.yaml (command: loop-sim)"
    required: false
    default: ""
  agent:
    description: "Agent spec for loop-sim (py:module:fn | cmd:./script | http(s)://url). Omit to dry-run with a mock agent."
    required: false
    default: ""
  path:
    description: "Repo path to audit (command: audit). Defaults to the checked-out repo."
    required: false
    default: "."
  evals:
    description: "Path to an evals.yaml of behavior test cases (score / evidence-pack)"
    required: false
    default: ""
  traces:
    description: "Path to an agent execution trace JSON/JSONL to validate (score / evidence-pack)"
    required: false
    default: ""
  html-report:
    description: "If set, write an HTML evidence/impact report to this path (e.g. report.html)"
    required: false
    default: ""
  output-evidence:
    description: "If set, write the JSON readiness report to this path"
    required: false
    default: ""
  fail-on-warn:
    description: "Exit with code 1 on WARN as well as FAIL (default: false)"
    required: false
    default: "false"
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  sarif-output:
    description: "If set, write a SARIF 2.1.0 file to this path and upload it to GitHub Code Scanning (e.g. release-gate.sarif)"
    required: false
    default: ""
  pr-comment:
    description: "Post/update a sticky summary comment on the PR (default: false)"
    required: false
    default: "false"
  notify:
    description: "Notification target URL(s): slack://..., datadog://..., otlp://... (comma-separated)"
    required: false
    default: ""

outputs:
  decision:
    description: "PROMOTE/HOLD/BLOCK (score) or PASS/WARN/FAIL (run, impact)"
  audit-score:
    description: "Readiness score 0-100 from the audit command"
  daily-cost:
    description: "Estimated daily cost in USD (from Impact Simulator)"
  runaway-cost:
    description: "Runaway scenario daily cost in USD"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@0a5c61591373683505ea898e09424647f5f1c7db # v5.4.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install release-gate
      shell: bash
      # Install the code that ships WITH this Action tag ($GITHUB_ACTION_PATH is
      # the checked-out action source at the pinned ref) — never whatever happens
      # to be latest on PyPI. This guarantees `uses: …@vX.Y.Z` runs the vX.Y.Z CLI,
      # so the Action can't advertise a command the installed package lacks.
      run: pip install "$GITHUB_ACTION_PATH" --quiet

    - name: Run release-gate audit
      if: inputs.command == 'audit'
      id: audit
      shell: bash
      run: |
        set +e
        SARIF_FLAGS=""
        if [ -n "${{ inputs.sarif-output }}" ]; then
          SARIF_FLAGS="--sarif ${{ inputs.sarif-output }}"
        fi
        # First pass: emit pure JSON for downstream steps (PR comment, commit
        # status). This MUST be --json only — combining it with --markdown makes
        # the CLI emit Markdown (which wins), corrupting the file every later
        # `jq` call reads.
        release-gate audit "${{ inputs.path }}" --json \
          > /tmp/rg-audit-report.json 2>/dev/null || true
        # Second pass: human-readable Markdown to the log and the job summary
        # (via $GITHUB_STEP_SUMMARY), plus SARIF if requested. This call owns
        # the real exit code.
        release-gate audit "${{ inputs.path }}" --markdown $SARIF_FLAGS
        EXIT_CODE=$?
        set -e
        # audit exit codes: 0 PROMOTE/no-agent · 10 HOLD · 1 BLOCK
        if [ "$EXIT_CODE" -eq "10" ] && [ "${{ inputs.fail-on-warn }}" != "true" ]; then
          echo "Audit decision: HOLD (allowed — set fail-on-warn: true to block)"
          exit 0
        fi
        exit $EXIT_CODE

    - name: Send notifications
      if: inputs.notify != ''
      shell: bash
      run: |
        IFS=',' read -ra NOTIFY_TARGETS <<< "${{ inputs.notify }}"
        NOTIFY_FLAGS=""
        for target in "${NOTIFY_TARGETS[@]}"; do
          target=$(echo "$target" | xargs)
          if [ -n "$target" ]; then
            NOTIFY_FLAGS="$NOTIFY_FLAGS --notify $target"
          fi
        done
        release-gate audit "${{ inputs.path }}" $NOTIFY_FLAGS --json > /dev/null 2>&1 || true

    - name: Run release-gate loop-sim
      if: inputs.command == 'loop-sim'
      id: loop-sim
      shell: bash
      run: |
        if [ -z "${{ inputs.scenarios }}" ]; then
          echo "::error::command: loop-sim requires a 'scenarios' input (path to scenarios.yaml)"
          exit 1
        fi
        AGENT_FLAG=""
        if [ -n "${{ inputs.agent }}" ]; then
          AGENT_FLAG="--agent ${{ inputs.agent }}"
        fi

        set +e
        release-gate loop-sim "${{ inputs.scenarios }}" $AGENT_FLAG
        EXIT_CODE=$?
        set -e

        # loop-sim exit codes: 0 PROMOTE · 10 HOLD · 1 BLOCK
        if [ "$EXIT_CODE" -eq "10" ] && [ "${{ inputs.fail-on-warn }}" != "true" ]; then
          echo "Loop readiness: HOLD (allowed — set fail-on-warn: true to block)"
          exit 0
        fi
        exit $EXIT_CODE

    - name: Run release-gate pr (AI-change review gate)
      if: inputs.command == 'pr'
      id: pr
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        # One PROMOTE/HOLD/BLOCK on what THIS diff introduced. --comment emits
        # GitHub-flavored markdown; we show it in the job summary and (optionally)
        # post it as a sticky PR comment.
        release-gate pr --base "${{ inputs.base }}" --comment > /tmp/rg-pr.md
        EXIT_CODE=$?
        set -e
        cat /tmp/rg-pr.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
        cat /tmp/rg-pr.md

        # Sticky PR comment (create or update) when requested on a pull_request event.
        if [ "${{ inputs.pr-comment }}" = "true" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
          BODY="<!-- release-gate-pr -->"$'\n'"$(cat /tmp/rg-pr.md)"
          CID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- release-gate-pr -->")) | .id' 2>/dev/null | head -1)
          if [ -n "$CID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${CID}" -X PATCH -f "body=${BODY}" --silent || true
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f "body=${BODY}" --silent || true
          fi
        fi

        # Exit codes: 0 PROMOTE · 10 HOLD · 1 BLOCK. HOLD is "mergeable after a
        # human looks" — only fail the check on it when fail-on-warn is set.
        if [ "$EXIT_CODE" -eq "10" ] && [ "${{ inputs.fail-on-warn }}" != "true" ]; then
          echo "release-gate pr: HOLD (allowed — set fail-on-warn: true to block on HOLD)"
          exit 0
        fi
        exit $EXIT_CODE

    - name: Run release-gate ${{ inputs.command }}
      if: inputs.command != 'audit' && inputs.command != 'loop-sim' && inputs.command != 'pr'
      id: gate
      shell: bash
      run: |
        EXTRA_FLAGS=""
        if [ -n "${{ inputs.evals }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --evals ${{ inputs.evals }}"
        fi
        if [ -n "${{ inputs.traces }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --traces ${{ inputs.traces }}"
        fi
        if [ -n "${{ inputs.html-report }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --html-report ${{ inputs.html-report }}"
        fi
        if [ -n "${{ inputs.output-evidence }}" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --output-evidence ${{ inputs.output-evidence }}"
        fi

        set +e
        release-gate ${{ inputs.command }} ${{ inputs.config }} $EXTRA_FLAGS
        EXIT_CODE=$?
        set -e

        # Exit code 10 = WARN. Treat as failure only if fail-on-warn is true.
        if [ "$EXIT_CODE" -eq "10" ] && [ "${{ inputs.fail-on-warn }}" != "true" ]; then
          echo "Decision: WARN (allowed — set fail-on-warn: true to block)"
          exit 0
        fi
        exit $EXIT_CODE

    - name: Upload HTML report
      if: inputs.html-report != '' && always()
      uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
      with:
        name: release-gate-report
        path: ${{ inputs.html-report }}

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.sarif-output != '' && inputs.command == 'audit' && always()
      uses: github/codeql-action/upload-sarif@65c74964a9ed8c44ed9f19d4bbc5757a6a8af9e4 # v3.25.0
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: release-gate

    - name: Post PR comment
      if: inputs.pr-comment == 'true' && github.event_name == 'pull_request' && inputs.command == 'audit' && always()
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Parse JSON report for summary data
        SCORE=$(jq -r '.score // "?"' /tmp/rg-audit-report.json 2>/dev/null || echo "?")
        DECISION=$(jq -r '.decision // "UNKNOWN"' /tmp/rg-audit-report.json 2>/dev/null || echo "UNKNOWN")
        FINDINGS=$(jq -r '.code_findings | length' /tmp/rg-audit-report.json 2>/dev/null || echo "0")
        MISSING=$(jq -r '.missing | length' /tmp/rg-audit-report.json 2>/dev/null || echo "?")
        PASSING=$(jq -r '.passing | length' /tmp/rg-audit-report.json 2>/dev/null || echo "?")

        case "$DECISION" in
          PROMOTE) BADGE="🟢 PROMOTE" ;;
          HOLD)    BADGE="🟡 HOLD" ;;
          BLOCK)   BADGE="🔴 BLOCK" ;;
          *)       BADGE="⚪ $DECISION" ;;
        esac

        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        # Build safeguard table rows from JSON
        SG_ROWS=$(jq -r '
          (.passing // [] | map("| " + .label + " | ✅ | " + (.evidence // "—") + " |")) +
          (.missing // [] | map("| " + .label + " | ❌ | " + ((.issues // [.risk] // []) | map(select(. != null)) | first // "—") + " |"))
          | .[]' /tmp/rg-audit-report.json 2>/dev/null || echo "| — | — | — |")

        BODY="<!-- release-gate -->\n## 🚪 release-gate\n\n**Score:** ${SCORE}/100 — ${BADGE}\n\n| Safeguard | Status | Detail |\n| --- | :---: | --- |\n${SG_ROWS}\n\n**Code risks:** ${FINDINGS} finding(s)  \n[Full run →](${RUN_URL})"

        # Find existing comment from this bot
        COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --jq '.[] | select(.body | startswith("<!-- release-gate -->")) | .id' 2>/dev/null | head -1)

        if [ -n "$COMMENT_ID" ]; then
          gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
            -X PATCH -f "body=${BODY}" --silent
        else
          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -f "body=${BODY}" --silent
        fi

    - name: Set commit status
      if: inputs.command == 'audit' && always()
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        SCORE=$(jq -r '.score // "?"' /tmp/rg-audit-report.json 2>/dev/null || echo "?")
        DECISION=$(jq -r '.decision // "UNKNOWN"' /tmp/rg-audit-report.json 2>/dev/null || echo "UNKNOWN")
        case "$DECISION" in
          PROMOTE) STATE="success" ;;
          HOLD)    STATE="pending" ;;
          BLOCK)   STATE="failure" ;;
          *)       STATE="error" ;;
        esac
        DESC="Score: ${SCORE}/100 — ${DECISION}"
        SHA="${{ github.event.pull_request.head.sha || github.sha }}"
        REPO="${{ github.repository }}"
        gh api "repos/${REPO}/statuses/${SHA}" \
          -f state="${STATE}" \
          -f context="release-gate / readiness" \
          -f description="${DESC}" \
          -f target_url="${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }}" \
          --silent || true
