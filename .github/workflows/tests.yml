name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install release-gate with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --ignore=tests/test_crypto.py -v --tb=short

      - name: Run Impact Simulator demo (safe)
        run: release-gate impact examples/governance-safe-pass.yaml

      - name: Run Impact Simulator demo (unsafe — expect BLOCK exit code)
        run: |
          set +e
          release-gate impact examples/governance-unsafe-fail.yaml
          EXIT=$?
          # BLOCK = exit code 1, which is expected for this demo
          if [ "$EXIT" -eq "0" ]; then
            echo "ERROR: unsafe config should have been blocked"
            exit 1
          fi
          echo "Correctly blocked unsafe deployment (exit $EXIT)"
